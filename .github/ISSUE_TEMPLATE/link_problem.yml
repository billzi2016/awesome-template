name: Link problem
description: Report a broken, moved, incorrect, or risky link.
title: "[Link]: "
labels: ["link-check"]
body:
  - type: input
    id: location
    attributes:
      label: Where is the link?
      placeholder: README.md > Related Resources
    validations:
      required: true
  - type: input
    id: link
    attributes:
      label: Current link
      placeholder: https://example.com
    validations:
      required: true
  - type: dropdown
    id: problem
    attributes:
      label: Problem type
      options:
        - Broken link
        - Moved page
        - Incorrect target
        - Unofficial source
        - Copyright or license concern
        - Other
    validations:
      required: true
  - type: input
    id: replacement
    attributes:
      label: Suggested replacement link
      placeholder: https://arxiv.org/abs/...
